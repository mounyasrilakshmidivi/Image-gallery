<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('animals')">Animals</button>
        <button onclick="filterImages('city')">City</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/1015/400/300" alt="">
        </div>

        <div class="gallery-item animals">
            <img src="https://picsum.photos/id/1025/400/300" alt="">
        </div>

        <div class="gallery-item city">
            <img src="https://picsum.photos/id/1031/400/300" alt="">
        </div>

        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/1040/400/300" alt="">
        </div>

        <div class="gallery-item animals">
            <img src="https://picsum.photos/id/1074/400/300" alt="">
        </div>

        <div class="gallery-item city">
            <img src="https://picsum.photos/id/1060/400/300" alt="">
        </div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094;</button>
        <img class="lightbox-img" src="">
        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
